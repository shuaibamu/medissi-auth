  # issuer-agent:
  #   build: ./src/agents/issuer
  #   ports: ["8002:8000"]
  #   depends_on: [besu-validator-1]
  #   networks: [medissi-net]
  #
  # verifier-agent:
  #   build: ./src/agents/verifier
  #   ports: ["8003:8000"]
  #   depends_on: [besu-validator-1]
  #   networks: [medissi-net]

volumes:
  besu-data-1:
  besu-data-2:
  besu-data-3:
  besu-data-4:

networks:
  medissi-net:
    driver: bridge
